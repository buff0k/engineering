{% extends "templates/web.html" %}

{% block page_content %}
<style>
#engineering-legals-portal .portal-link-wrap {
    position: relative;
}

#engineering-legals-portal .portal-link-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 1000;
    background: #fff;
    border: 1px solid #d1d8dd;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    max-height: 220px;
    overflow-y: auto;
    display: none;
}

#engineering-legals-portal .portal-link-option {
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f3f3f3;
}

#engineering-legals-portal .portal-link-option:last-child {
    border-bottom: none;
}

#engineering-legals-portal .portal-link-option:hover {
    background: #f7fafc;
}

#engineering-legals-portal .portal-link-empty {
    padding: 10px 12px;
    color: #6c757d;
}
</style>

<div class="container my-4" id="engineering-legals-portal">
    <h2>Engineering Legals</h2>
    <p>Supplier upload portal</p>

    {% if frappe.form_dict.get("success") %}
    <div class="alert alert-success">
        Engineering Legals record created successfully:
        <strong>{{ frappe.form_dict.get("name") }}</strong>
    </div>
    {% endif %}

    <form id="engineering-legals-form" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ frappe.session.csrf_token or '' }}">
        <input type="hidden" name="draft_name" value="{{ form_values.draft_name or '' }}">
        <input type="hidden" name="attach_paper" id="attach_paper" value="{{ form_values.attach_paper }}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="sections"><strong>Sections <span class="text-danger">*</span></strong></label>
                <div class="portal-link-wrap">
                    <input
                        type="text"
                        class="form-control"
                        id="sections"
                        name="sections"
                        value="{{ form_values.sections }}"
                        placeholder="Search Section"
                        autocomplete="off"
                        required
                    >
                    <div id="sections_dropdown" class="portal-link-dropdown"></div>
                </div>
                <script type="application/json" id="sections_options_json">{{ sections_options | tojson }}</script>
            </div>
            <div class="col-md-6 mb-3">
                <label for="file_input"><strong>Attach Paper <span class="text-danger">*</span></strong></label>

                <div class="d-flex align-items-center flex-wrap gap-2">
                    <label for="file_input" class="btn btn-default btn-sm mb-0" id="attach_paper_btn">
                        Attach
                    </label>
                    <span id="selected_file_name" class="text-muted small">No file chosen</span>
                </div>

                <input
                    type="file"
                    id="file_input"
                    accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx"
                    style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;"
                >

                <small id="upload_status" class="form-text text-muted mt-2"></small>
                <div id="uploaded_file_link" class="mt-2"></div>
            </div>




<div class="col-md-6 mb-3">
    <label for="site"><strong>Site <span class="text-danger">*</span></strong></label>
    <div class="portal-link-wrap" id="site_wrap">
        <input
            type="text"
            class="form-control"
            id="site"
            name="site"
            value="{{ form_values.site }}"
            placeholder="Search Site"
            autocomplete="off"
            required
        >
        <div id="site_dropdown" class="portal-link-dropdown"></div>
    </div>
    <script type="application/json" id="site_options_json">{{ site_options | tojson }}</script>
</div>


            <div class="col-md-6 mb-3">
                <label for="start_date"><strong>Document Start Date <span class="text-danger">*</span></strong></label>
                <input
                    type="date"
                    class="form-control"
                    id="start_date"
                    name="start_date"
                    value="{{ form_values.start_date }}"
                    required
                    onfocus="this.showPicker && this.showPicker()"
                    onclick="this.showPicker && this.showPicker()"
                >
            </div>

            <div class="col-md-6 mb-3">
                <label for="fleet_number"><strong>Fleet Number <span class="text-danger">*</span></strong></label>
                <div class="portal-link-wrap">
                    <input
                        type="text"
                        class="form-control"
                        id="fleet_number"
                        name="fleet_number"
                        value="{{ form_values.fleet_number }}"
                        placeholder="Search Fleet Number"
                        autocomplete="off"
                        required
                    >
                    <div id="fleet_number_dropdown" class="portal-link-dropdown"></div>
                </div>
                <script type="application/json" id="fleet_number_options_json">{{ asset_options | tojson }}</script>
            </div>

            <div class="col-md-6 mb-3">
                <label for="expiry_date"><strong>Expiry Date</strong></label>
                <input
                    type="date"
                    class="form-control"
                    id="expiry_date"
                    name="expiry_date"
                    value="{{ form_values.expiry_date }}"
                    readonly
                >
            </div>

            <div class="col-md-6 mb-3" id="vehicle_type_wrap" style="display:none;">
                <label for="vehicle_type"><strong>Vehicle Type <span class="text-danger">*</span></strong></label>
                <select class="form-control" id="vehicle_type" name="vehicle_type">
                    <option value="">Select Vehicle Type</option>
                    <option value="LDV" {% if form_values.vehicle_type == "LDV" %}selected{% endif %}>LDV</option>
                    <option value="TMM" {% if form_values.vehicle_type == "TMM" %}selected{% endif %}>TMM</option>
                </select>
            </div>

            <div class="col-md-6 mb-3" id="lifting_type_wrap" style="display:none;">
                <label for="lifting_type"><strong>Lifting Type <span class="text-danger">*</span></strong></label>
                <select class="form-control" id="lifting_type" name="lifting_type">
                    <option value="">Select Lifting Type</option>
                    <option value="Inspection" {% if form_values.lifting_type == "Inspection" %}selected{% endif %}>Inspection</option>
                    <option value="Certificate" {% if form_values.lifting_type == "Certificate" %}selected{% endif %}>Certificate</option>
                </select>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" id="submit_btn">Save</button>
            <a href="/engineering_legals_list" class="btn btn-danger" target="_blank" rel="noopener noreferrer">See List</a>
        </div>
    </form>
</div>

<script>
(function () {
    const sectionsEl = document.getElementById("sections");
    const siteEl = document.getElementById("site");
    const fleetNumberEl = document.getElementById("fleet_number");
    const vehicleTypeEl = document.getElementById("vehicle_type");
    const liftingTypeEl = document.getElementById("lifting_type");
    const startDateEl = document.getElementById("start_date");
    const expiryDateEl = document.getElementById("expiry_date");
    const vehicleWrap = document.getElementById("vehicle_type_wrap");
    const liftingWrap = document.getElementById("lifting_type_wrap");
    const fileInput = document.getElementById("file_input");
    const attachPaperEl = document.getElementById("attach_paper");
    const uploadStatusEl = document.getElementById("upload_status");
    const uploadedFileLinkEl = document.getElementById("uploaded_file_link");
    const selectedFileNameEl = document.getElementById("selected_file_name");
    const formEl = document.getElementById("engineering-legals-form");
    const submitBtn = document.getElementById("submit_btn");

    const sectionsDropdownEl = document.getElementById("sections_dropdown");
    const fleetNumberDropdownEl = document.getElementById("fleet_number_dropdown");
    const siteDropdownEl = document.getElementById("site_dropdown");
    const sectionsOptions = JSON.parse(document.getElementById("sections_options_json").textContent || "[]");
    const fleetNumberOptions = JSON.parse(document.getElementById("fleet_number_options_json").textContent || "[]");

    function pad(n) {
        return String(n).padStart(2, "0");
    }

    function addMonths(dateStr, months) {
        const parts = dateStr.split("-");
        const d = new Date(parts[0], Number(parts[1]) - 1, parts[2]);
        d.setMonth(d.getMonth() + months);

        return [
            d.getFullYear(),
            pad(d.getMonth() + 1),
            pad(d.getDate())
        ].join("-");
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }



function setupServerSearchDropdown(inputEl, dropdownEl, doctype, queryMethod) {
    let lastRequest = null;

    async function render(filterText) {
        const term = (filterText || "").trim();

        try {
            lastRequest = term;

            const r = await frappe.call({
                method: "frappe.desk.search.search_link",
                args: {
                    doctype: doctype,
                    txt: term,
                    query: queryMethod,
                    page_length: 20
                }
            });

            if (lastRequest !== term) return;

            const results = (r.message || []).map(row => row.value || row.name || row);

            if (!results.length) {
                dropdownEl.innerHTML = '<div class="portal-link-empty">No matches found</div>';
                dropdownEl.style.display = "block";
                return;
            }

            dropdownEl.innerHTML = results.map(option =>
                '<div class="portal-link-option" data-value="' + escapeHtml(option) + '">' + escapeHtml(option) + '</div>'
            ).join("");

            dropdownEl.style.display = "block";
        } catch (e) {
            dropdownEl.innerHTML = '<div class="portal-link-empty">No matches found</div>';
            dropdownEl.style.display = "block";
        }
    }

    inputEl.addEventListener("focus", function () {
        render(inputEl.value);
    });

    inputEl.addEventListener("input", function () {
        render(inputEl.value);
    });

    dropdownEl.addEventListener("mousedown", function (e) {
        const optionEl = e.target.closest(".portal-link-option");
        if (!optionEl) return;

        const value = optionEl.getAttribute("data-value");
        inputEl.value = value;
        dropdownEl.style.display = "none";
    });

    document.addEventListener("click", function (e) {
        const wrap = inputEl.closest(".col-md-6");
        if (!wrap.contains(e.target)) {
            dropdownEl.style.display = "none";
        }
    });
}



    function setupSearchableDropdown(inputEl, dropdownEl, options, onSelect) {
        function render(filterText) {
            const term = (filterText || "").trim().toLowerCase();
            const filtered = options.filter(option =>
                String(option || "").toLowerCase().includes(term)
            ).slice(0, 12);

            if (!filtered.length) {
                dropdownEl.innerHTML = '<div class="portal-link-empty">No matches found</div>';
                dropdownEl.style.display = "block";
                return;
            }

            dropdownEl.innerHTML = filtered.map(option =>
                '<div class="portal-link-option" data-value="' + escapeHtml(option) + '">' + escapeHtml(option) + '</div>'
            ).join("");

            dropdownEl.style.display = "block";
        }

        inputEl.addEventListener("focus", function () {
            render(inputEl.value);
        });

        inputEl.addEventListener("input", function () {
            render(inputEl.value);
        });

        dropdownEl.addEventListener("mousedown", function (e) {
            const optionEl = e.target.closest(".portal-link-option");
            if (!optionEl) return;

            const value = optionEl.getAttribute("data-value");
            inputEl.value = value;
            dropdownEl.style.display = "none";

            if (onSelect) onSelect(value);
        });

        document.addEventListener("click", function (e) {
            const wrap = inputEl.closest(".portal-link-wrap");
            if (!wrap.contains(e.target)) {
                dropdownEl.style.display = "none";
            }
        });
    }



    function applySectionRules() {
        const section = (sectionsEl.value || "").trim();

        vehicleWrap.style.display = "none";
        liftingWrap.style.display = "none";
        vehicleTypeEl.required = false;
        liftingTypeEl.required = false;

        if (section === "Brake Test" || section === "PDS") {
            vehicleWrap.style.display = "";
            vehicleTypeEl.required = true;
        }

        if (section === "Lifting Equipment") {
            liftingWrap.style.display = "";
            liftingTypeEl.required = true;
        }
    }

    function setExpiryDate() {
        const section = (sectionsEl.value || "").trim();
        const start = startDateEl.value;

        if (!start) {
            expiryDateEl.value = "";
            return;
        }

        const noExpiry = new Set([
            "Machine Service Records",
            "Service Schedule",
            "Wearcheck"
        ]);

        if (noExpiry.has(section)) {
            expiryDateEl.value = "";
            return;
        }

        let expiry = "";

        if (section === "Brake Test") {
            if (vehicleTypeEl.value === "TMM") expiry = addMonths(start, 1);
            if (vehicleTypeEl.value === "LDV") expiry = addMonths(start, 3);
        } else if (section === "PDS") {
            if (vehicleTypeEl.value === "TMM") expiry = addMonths(start, 1);
            if (vehicleTypeEl.value === "LDV") expiry = addMonths(start, 3);
        } else if (section === "FRCS") {
            expiry = addMonths(start, 3);
        } else if (section === "Lifting Equipment") {
            if (liftingTypeEl.value === "Inspection") expiry = addMonths(start, 3);
            if (liftingTypeEl.value === "Certificate") expiry = addMonths(start, 12);
        } else if (section === "NDT") {
            expiry = addMonths(start, 6);
        } else if (section === "Fire Suppression") {
            expiry = addMonths(start, 3);
        } else if (section === "Tyre Inspection Report") {
            expiry = addMonths(start, 1);
        } else if (section === "Illumination Baseline") {
            expiry = addMonths(start, 24);
        } else {
            expiry = "";
        }

        expiryDateEl.value = expiry;
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("is_private", 1);
        formData.append("folder", "Home");

        const csrfToken =
            (window.frappe && frappe.csrf_token) ||
            window.csrf_token ||
            document.querySelector('input[name="csrf_token"]').value;

        const response = await fetch("/api/method/upload_file", {
            method: "POST",
            headers: {
                "X-Frappe-CSRF-Token": csrfToken
            },
            body: formData,
            credentials: "same-origin"
        });

        const data = await response.json();

        if (!response.ok || data.exc) {
            throw new Error("Upload failed");
        }

        const message = data.message || {};
        return message.file_url || "";
    }

    sectionsEl.addEventListener("change", function () {
        if (vehicleWrap.style.display === "none") {
            vehicleTypeEl.value = "";
        }
        if (liftingWrap.style.display === "none") {
            liftingTypeEl.value = "";
        }

        applySectionRules();
        setExpiryDate();
    });

    vehicleTypeEl.addEventListener("change", setExpiryDate);
    liftingTypeEl.addEventListener("change", setExpiryDate);
    startDateEl.addEventListener("change", setExpiryDate);

    setupSearchableDropdown(sectionsEl, sectionsDropdownEl, sectionsOptions, function () {
        applySectionRules();
        setExpiryDate();
    });

    

    const siteOptions = JSON.parse(document.getElementById("site_options_json").textContent || "[]");
    setupSearchableDropdown(siteEl, siteDropdownEl, siteOptions);




    setupSearchableDropdown(fleetNumberEl, fleetNumberDropdownEl, fleetNumberOptions);

    fileInput.addEventListener("change", async function () {
        const file = fileInput.files[0];
        if (!file) {
            selectedFileNameEl.textContent = "No file chosen";
            return;
        }

        selectedFileNameEl.textContent = file.name;
        uploadStatusEl.textContent = "Uploading...";
        uploadedFileLinkEl.innerHTML = "";
        attachPaperEl.value = "";
        submitBtn.disabled = true;

        try {
            const fileUrl = await uploadFile(file);
            attachPaperEl.value = fileUrl;
            uploadStatusEl.textContent = "Upload complete";
            uploadedFileLinkEl.innerHTML = '<a href="' + fileUrl + '" target="_blank">View uploaded file</a>';
        } catch (e) {
            uploadStatusEl.textContent = "Upload failed";
            attachPaperEl.value = "";
            selectedFileNameEl.textContent = "No file chosen";
        } finally {
            submitBtn.disabled = false;
        }
    });
    formEl.addEventListener("submit", function (e) {
        if (!attachPaperEl.value) {
            e.preventDefault();
            alert("Please upload Attach Paper first.");
            return;
        }
    });

    applySectionRules();
    setExpiryDate();

    if (attachPaperEl.value) {
        const existingName = attachPaperEl.value.split("/").pop();
        selectedFileNameEl.textContent = existingName || "Uploaded file";
        uploadedFileLinkEl.innerHTML = '<a href="' + attachPaperEl.value + '" target="_blank">View uploaded file</a>';
        uploadStatusEl.textContent = "Existing uploaded file loaded";
    }
})();
</script>
{% endblock %}
